<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keep Alive - Клуб Ритм</title>
  <style>
    body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
    .container{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:20px;padding:40px;max-width:500px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    h1{font-size:2rem;margin-bottom:10px}
    .status{font-size:1.2rem;margin:20px 0;padding:15px;background:rgba(255,255,255,.2);border-radius:10px}
    .status.online{background:rgba(34,197,94,.3)}
    .status.offline{background:rgba(239,68,68,.3)}
    .log{max-height:200px;overflow-y:auto;background:rgba(0,0,0,.2);border-radius:10px;padding:15px;margin-top:20px;text-align:left;font-size:.85rem}
    .log-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.1)}
    .log-item:last-child{border:none}
    input{width:100%;padding:12px;border:2px solid rgba(255,255,255,.3);border-radius:8px;background:rgba(255,255,255,.1);color:#fff;font-size:1rem;margin:10px 0}
    input::placeholder{color:rgba(255,255,255,.6)}
    button{background:#fff;color:#7c3aed;border:none;padding:12px 30px;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin:5px}
    button:hover{background:#f3e8ff}
    .info{font-size:.9rem;opacity:.8;margin-top:20px}
  </style>
</head>
<body>
  <div class="container">
    <h1>🎭 Keep Alive</h1>
    <p>Автоматический пинг сервера каждые 10 минут</p>
    
    <input type="text" id="urlInput" placeholder="https://your-app.onrender.com" value="">
    <button onclick="startPing()">Запустить</button>
    <button onclick="stopPing()">Остановить</button>
    
    <div class="status" id="status">Ожидание...</div>
    
    <div class="log" id="log"></div>
    
    <div class="info">
      💡 Оставьте эту вкладку открытой, чтобы сервер не засыпал
    </div>
  </div>

  <script>
    let intervalId = null;
    let url = '';

    function addLog(message, isError = false) {
      const log = document.getElementById('log');
      const time = new Date().toLocaleTimeString('ru-RU');
      const item = document.createElement('div');
      item.className = 'log-item';
      item.style.color = isError ? '#fca5a5' : '#fff';
      item.textContent = `[${time}] ${message}`;
      log.insertBefore(item, log.firstChild);
      if (log.children.length > 20) log.removeChild(log.lastChild);
    }

    async function ping() {
      const status = document.getElementById('status');
      try {
        const res = await fetch(url + '/api/health');
        const data = await res.json();
        status.className = 'status online';
        status.textContent = '✅ Сервер онлайн';
        addLog(`Пинг успешен: ${data.message}`);
      } catch (error) {
        status.className = 'status offline';
        status.textContent = '❌ Сервер недоступен';
        addLog(`Ошибка: ${error.message}`, true);
      }
    }

    function startPing() {
      url = document.getElementById('urlInput').value.trim();
      if (!url) {
        alert('Введите URL сервера!');
        return;
      }
      if (intervalId) {
        addLog('Пинг уже запущен');
        return;
      }
      localStorage.setItem('keepAliveUrl', url);
      addLog('Запуск автопинга...');
      ping();
      intervalId = setInterval(ping, 10 * 60 * 1000); // каждые 10 минут
      addLog('Автопинг запущен (каждые 10 минут)');
    }

    function stopPing() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
        addLog('Автопинг остановлен');
        document.getElementById('status').className = 'status';
        document.getElementById('status').textContent = 'Остановлено';
      }
    }

    // Восстановить URL из localStorage
    const savedUrl = localStorage.getItem('keepAliveUrl');
    if (savedUrl) {
      document.getElementById('urlInput').value = savedUrl;
    }
  </script>
</body>
</html>
